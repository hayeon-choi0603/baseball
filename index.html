<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>야구선수 빌기 - 세 가지 모드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    cursor: none;
    user-select: none;
    transition: background 0.5s ease;
    touch-action: none; /* 터치 스크롤 방지 */
    -webkit-touch-callout: none; /* iOS 터치 메뉴 방지 */
    -webkit-user-select: none; /* iOS 텍스트 선택 방지 */
  }

  /* 모바일에서는 손 커서 숨기기 */
  @media (max-width: 768px) {
    html, body { cursor: default; }
    .hand { display: none; }
    .mode-btn, .reset-btn { cursor: pointer; }
    
    /* 모바일에서 엉덩이 더 크게 */
    .player-wrap {
      width: 420px !important;
      height: 630px !important;
    }
    
    /* 모바일에서 UI 요소들 더 크게 */
    .count { font-size: 36px !important; }
    .stat { font-size: 28px !important; }
    .label { font-size: 14px !important; }
    .title h1 { font-size: 42px !important; }
    .title p { font-size: 16px !important; }
    .mode-btn { 
      padding: 12px 20px !important; 
      font-size: 15px !important; 
    }
    .reset-btn { 
      padding: 14px 28px !important; 
      font-size: 16px !important; 
    }
  }

  /* 모드별 배경 */
  body.mode-goodjob {
    background: #fff;
  }
  body.mode-spank {
    background: #fff;
  }
  body.mode-punish {
    background: #fff;
  }

  /* 둥둥 떠다니는 배경 이모지 */
  .bg-float {
    position: fixed; pointer-events: none; opacity: 0.5;
    animation: floatUp linear infinite;
    font-size: 22px;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0); opacity: 0; }
    10% { opacity: 0.6; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* 분노 번개 (punish 모드) */
  .lightning {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,40,40,0.15) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0;
    z-index: 1;
    transition: opacity 0.3s;
  }
  .lightning.flash { animation: flash 0.3s ease-out; }
  @keyframes flash {
    0% { opacity: 0; }
    30% { opacity: 1; background: radial-gradient(circle at 50% 50%, rgba(255,80,80,0.4) 0%, transparent 70%); }
    100% { opacity: 0; }
  }

  .ui {
    position: fixed; top: 16px; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 0 24px; z-index: 10; pointer-events: none;
  }
  .panel {
    background: rgba(255,255,255,0.92);
    border: 3px solid #ff6fa3;
    border-radius: 20px;
    padding: 10px 18px;
    box-shadow: 4px 4px 0 #ff6fa3;
    font-weight: 800;
    transition: all 0.3s ease;
  }
  body.mode-spank .panel {
    background: rgba(255,255,255,0.85);
    border-color: #222;
    box-shadow: 4px 4px 0 #222;
  }
  body.mode-punish .panel {
    background: rgba(20,0,0,0.85);
    border-color: #ff2d2d;
    box-shadow: 0 0 12px rgba(255,40,40,0.6), 4px 4px 0 #ff2d2d;
  }

  .count { font-size: 28px; color: #ff3d77; }
  .stat { font-size: 22px; color: #ff8c42; }
  .label { font-size: 12px; color: #c44b7a; letter-spacing: 1px; }

  body.mode-spank .count { color: #d63031; }
  body.mode-spank .stat { color: #e67e22; }
  body.mode-spank .label { color: #555; }

  body.mode-punish .count { color: #ff5757; text-shadow: 0 0 10px #ff0000; }
  body.mode-punish .stat { color: #ff8c1a; text-shadow: 0 0 8px #ff5500; }
  body.mode-punish .label { color: #ff9999; }

  .title {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 5; pointer-events: none;
  }
  .title h1 {
    font-size: 36px;
    color: #ff3d77;
    text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
    letter-spacing: 2px;
    transition: all 0.3s ease;
  }
  .title p { color: #c44b7a; font-size: 14px; margin-top: 6px; font-weight: 600; transition: all 0.3s ease; }

  body.mode-spank .title h1 {
    color: #fff;
    text-shadow: 3px 3px 0 #222, -1px -1px 0 #222, 1px -1px 0 #222, -1px 1px 0 #222;
  }
  body.mode-spank .title p { color: #fff; text-shadow: 1px 1px 0 #222; }

  body.mode-punish .title h1 {
    color: #ff2d2d;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 20px #ff0000;
    animation: titleShake 0.8s ease-in-out infinite;
  }
  body.mode-punish .title p { color: #ffaaaa; text-shadow: 1px 1px 0 #000; }

  @keyframes titleShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }

  .stage {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  .player-wrap {
    position: relative;
    width: 360px; height: 540px;
    transition: transform 0.08s ease-out;
    filter: drop-shadow(6px 8px 0 rgba(255,140,180,0.25));
  }
  body.mode-spank .player-wrap {
    filter: drop-shadow(6px 8px 0 rgba(0,0,0,0.18));
  }
  body.mode-punish .player-wrap {
    filter: drop-shadow(0 0 15px rgba(255,0,0,0.3));
  }

  .player-wrap.wiggle { animation: wiggle 0.5s ease-in-out; }
  .player-wrap.shake { animation: shake 0.35s; }
  .player-wrap.hardShake { animation: hardShake 0.5s; }

  @keyframes wiggle {
    0%, 100% { transform: translate(0,0) rotate(0); }
    25% { transform: translate(-3px, -2px) rotate(-1deg); }
    50% { transform: translate(3px, -3px) rotate(1deg); }
    75% { transform: translate(-2px, -1px) rotate(-0.5deg); }
  }
  @keyframes shake {
    0%, 100% { transform: translate(0,0) rotate(0); }
    20% { transform: translate(-6px, 2px) rotate(-1.5deg); }
    40% { transform: translate(7px, -2px) rotate(1.5deg); }
    60% { transform: translate(-4px, 3px) rotate(-1deg); }
    80% { transform: translate(3px, -1px) rotate(0.8deg); }
  }
  @keyframes hardShake {
    0%, 100% { transform: translate(0,0) rotate(0); }
    10% { transform: translate(-12px, 4px) rotate(-3deg); }
    20% { transform: translate(13px, -4px) rotate(3deg); }
    30% { transform: translate(-10px, 5px) rotate(-2.5deg); }
    40% { transform: translate(11px, -3px) rotate(2deg); }
    50% { transform: translate(-8px, 4px) rotate(-1.5deg); }
    60% { transform: translate(9px, -2px) rotate(1.5deg); }
    70% { transform: translate(-6px, 3px) rotate(-1deg); }
    80% { transform: translate(5px, -1px) rotate(0.8deg); }
    90% { transform: translate(-2px, 1px) rotate(-0.3deg); }
  }

  .player-svg { width: 100%; height: 100%; display: block; }

  /* 실제 이미지 스타일 */
  #buttImage {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #hitbox {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    cursor: none;
  }

  /* 효과 마크 (모드별 다른 스타일) */
  .effect-mark {
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  /* goodjob: 분홍 광채 */
  .effect-mark.glow {
    background: radial-gradient(circle, rgba(255,180,210,0.7) 0%, rgba(255,200,220,0.4) 50%, rgba(255,200,220,0) 75%);
    mix-blend-mode: multiply;
  }
  .effect-mark.glow.show { opacity: 1; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  /* spank: 빨간 자국 */
  .effect-mark.red {
    background: radial-gradient(circle, rgba(255,80,80,0.85) 0%, rgba(255,120,120,0.5) 40%, rgba(255,150,150,0) 70%);
    mix-blend-mode: multiply;
  }
  .effect-mark.red.show { opacity: 1; }
  /* punish: 강렬한 빨간 자국 */
  .effect-mark.anger {
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(200,20,20,1) 0%, rgba(255,40,40,0.85) 30%, rgba(255,80,80,0.5) 55%, rgba(255,100,100,0) 75%);
    mix-blend-mode: multiply;
  }
  .effect-mark.anger.show { opacity: 1; }

  .effect-mark.left { top: 160px; left: 80px; }
  .effect-mark.right { top: 160px; right: 50px; }

  body.mode-spank .effect-mark.left { top: 165px; left: 95px; }
  body.mode-spank .effect-mark.right { top: 165px; right: 60px; }
  body.mode-punish .effect-mark { width: 160px; height: 160px; top: 155px; }
  body.mode-punish .effect-mark.left { left: 75px; }
  body.mode-punish .effect-mark.right { right: 45px; }

  /* 손 커서 */
  .hand {
    position: fixed;
    font-size: 64px;
    pointer-events: none;
    transform-origin: 50% 80%;
    transform: translate(-50%, -50%) rotate(-10deg);
    z-index: 100;
    transition: transform 0.05s ease-out, filter 0.3s ease;
    filter: drop-shadow(2px 4px 3px rgba(255,100,150,0.4));
  }
  body.mode-spank .hand {
    font-size: 70px;
    transform: translate(-50%, -50%) rotate(-25deg);
    filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.3));
  }
  body.mode-punish .hand {
    font-size: 78px;
    transform: translate(-50%, -50%) rotate(-30deg);
    filter: drop-shadow(0 0 10px rgba(255,0,0,0.7));
  }

  .hand.pat { animation: pat 0.4s ease-out; }
  .hand.slap { animation: slap 0.28s ease-out; }
  .hand.smack { animation: smack 0.22s cubic-bezier(0.4, 0, 0.6, 1); }

  @keyframes pat {
    0%   { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
    25%  { transform: translate(-50%, -65%) rotate(-12deg) scale(1.05); }
    50%  { transform: translate(-50%, -45%) rotate(-8deg) scale(1.15); }
    75%  { transform: translate(-50%, -52%) rotate(-10deg) scale(1.08); }
    100% { transform: translate(-50%, -50%) rotate(-10deg) scale(1); }
  }
  @keyframes slap {
    0%   { transform: translate(-50%, -50%) rotate(-25deg) scale(1); }
    35%  { transform: translate(-50%, -30%) rotate(20deg) scale(1.25); }
    50%  { transform: translate(-50%, -55%) rotate(-10deg) scale(1.15); }
    100% { transform: translate(-50%, -50%) rotate(-25deg) scale(1); }
  }
  @keyframes smack {
    0%   { transform: translate(-50%, -50%) rotate(-30deg) scale(1); }
    25%  { transform: translate(-50%, -20%) rotate(35deg) scale(1.4); }
    45%  { transform: translate(-50%, -60%) rotate(-15deg) scale(1.25); }
    100% { transform: translate(-50%, -50%) rotate(-30deg) scale(1); }
  }

  /* 임팩트 텍스트 */
  .impact-text {
    position: fixed;
    pointer-events: none;
    font-weight: 900;
    font-size: 32px;
    animation: impactPop 1s ease-out forwards;
    z-index: 99;
    white-space: nowrap;
  }
  @keyframes impactPop {
    0% { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
    20% { transform: translate(-50%,-80%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%,-180%) scale(1); opacity: 0; }
  }

  /* goodjob: 칭찬 텍스트 */
  .impact-text.praise {
    color: #ff3d77;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0 0 12px #ffb6d0;
  }
  /* spank: 짜릿한 소리 */
  .impact-text.slap-text {
    font-size: 38px;
    color: #ff3838;
    text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
  }
  /* punish: 혼난다 */
  .impact-text.scold {
    font-size: 46px;
    color: #ff2d2d;
    text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 0 0 18px #ff0000;
    letter-spacing: 2px;
  }

  /* 파티클 이모지 */
  .particle {
    position: fixed; pointer-events: none;
    font-size: 26px;
    animation: particleFly 1s ease-out forwards;
    z-index: 98;
  }
  @keyframes particleFly {
    0% { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
  }

  /* 버튼들 */
  .mode-buttons {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 11; pointer-events: auto;
    display: flex; gap: 8px;
  }
  .mode-btn {
    background: #fff; border: 2px solid #c44b7a; border-radius: 999px;
    padding: 8px 16px; font-size: 13px; font-weight: 700; color: #c44b7a;
    cursor: none; transition: all 0.2s ease; text-decoration: none;
  }
  .mode-btn:hover { transform: scale(1.05); }
  .mode-btn.active {
    background: #ff6fa3; color: #fff; border-color: #ff6fa3;
    box-shadow: 0 0 10px rgba(255,111,163,0.5);
  }
  .mode-btn.spank { border-color: #222; color: #222; }
  .mode-btn.spank.active { background: #222; color: #fff; }
  .mode-btn.punish { border-color: #ff2d2d; color: #ff2d2d; }
  .mode-btn.punish.active { background: #ff2d2d; color: #fff; }

  .reset-btn {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #fff; border: 3px solid #ff6fa3; border-radius: 999px;
    padding: 10px 24px; font-weight: 800; font-size: 14px; color: #ff3d77;
    box-shadow: 3px 3px 0 #ff6fa3; cursor: none; z-index: 10;
    transition: all 0.3s ease;
  }
  .reset-btn:active { transform: translateX(-50%) translateY(2px); box-shadow: 1px 1px 0 #ff6fa3; }

  body.mode-spank .reset-btn {
    background: #fff; border-color: #222; color: #222;
    box-shadow: 3px 3px 0 #222;
  }
  body.mode-spank .reset-btn:active { box-shadow: 1px 1px 0 #222; }

  body.mode-punish .reset-btn {
    background: #1a0303; border-color: #ff2d2d; color: #ff5757;
    box-shadow: 0 0 12px rgba(255,40,40,0.6), 3px 3px 0 #ff2d2d;
    text-shadow: 0 0 8px #ff0000;
  }
  body.mode-punish .reset-btn:active { box-shadow: 0 0 8px rgba(255,40,40,0.6), 1px 1px 0 #ff2d2d; }

  /* 클릭 영역 */
  #hitbox {
    cursor: none;
  }
</style>
</head>
<body class="mode-goodjob">

<!-- 분노 번개 효과 (punish 모드) -->
<div class="lightning" id="lightning"></div>

<!-- 모드 선택 버튼 -->
<div class="mode-buttons">
  <a href="#" class="mode-btn active" data-mode="goodjob">💖 잘했어요</a>
  <a href="#" class="mode-btn spank" data-mode="spank">🍑 찰싹!</a>
  <a href="#" class="mode-btn punish" data-mode="punish">😡 혼내기</a>
</div>

<!-- 상단 UI -->
<div class="ui">
  <div class="panel">
    <div class="label" id="labelCount">팡팡</div>
    <div class="count" id="count">0</div>
  </div>
  <div class="panel">
    <div class="label" id="labelStat">PRAISE</div>
    <div class="stat" id="stat">💖</div>
  </div>
</div>

<!-- 타이틀 -->
<div class="title">
  <h1 id="titleText">궁디팡팡 잘했어요~ 💖</h1>
  <p id="titleDesc">오늘도 수고했어요! 부드럽게 토닥토닥 해주세요</p>
</div>

<!-- 무대 -->
<div class="stage">
  <div class="player-wrap" id="playerWrap">
    <!-- 실제 엉덩이 이미지 -->
    <img id="buttImage" src="assets/butt_normal.png" alt="야구선수 엉덩이" />
    <!-- 클릭 영역 (이미지 위에 투명하게) -->
    <div id="hitbox"></div>
    <!-- 효과 마크 -->
    <div class="effect-mark glow left" id="markLeft"></div>
    <div class="effect-mark glow right" id="markRight"></div>
  </div>
</div>

<!-- 손 커서 -->
<div class="hand" id="hand">👋</div>

<!-- 리셋 버튼 -->
<button class="reset-btn" id="resetBtn">🔄 리셋</button>

<script>
  // DOM 요소들
  const hand = document.getElementById('hand');
  const playerWrap = document.getElementById('playerWrap');
  const markLeft = document.getElementById('markLeft');
  const markRight = document.getElementById('markRight');
  const hitbox = document.getElementById('hitbox');
  const countEl = document.getElementById('count');
  const statEl = document.getElementById('stat');
  const labelCount = document.getElementById('labelCount');
  const labelStat = document.getElementById('labelStat');
  const titleText = document.getElementById('titleText');
  const titleDesc = document.getElementById('titleDesc');
  const resetBtn = document.getElementById('resetBtn');
  const lightning = document.getElementById('lightning');
  const modeButtons = document.querySelectorAll('.mode-btn');
  const buttImage = document.getElementById('buttImage');

  // 상태
  let currentMode = 'goodjob';
  let count = 0;
  let combo = 0;
  let comboTimer = null;
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  // 모드별 설정
  const modeConfig = {
    goodjob: {
      bodyClass: 'mode-goodjob',
      handEmoji: '👋',
      title: '궁디팡팡 잘했어요~ 💖',
      desc: '오늘도 수고했어요! 부드럽게 토닥토닥 해주세요',
      labelCount: '팡팡',
      labelStat: 'PRAISE',
      statDefault: '💖',
      markClass: 'glow',
      animation: 'wiggle',
      handAnimation: 'pat',
      impactClass: 'praise',
      particles: ['💖','💕','💗','✨','🌸'],
      impactTexts: ['좋아~!', '잘했어~', '최고야!', '사랑해~', '응원해!', '굿모닝!', '수고해~', '파이팅!'],
      audioType: 'pat'
    },
    spank: {
      bodyClass: 'mode-spank',
      handEmoji: '✋',
      title: '찰싹! 야구선수 엉덩이 🍑',
      desc: '엉덩이를 클릭해서 때려보세요!',
      labelCount: 'SPANKS',
      labelStat: 'COMBO',
      statDefault: 'x0',
      markClass: 'red',
      animation: 'shake',
      handAnimation: 'slap',
      impactClass: 'slap-text',
      particles: ['⭐','✨','💢','💥','🌟'],
      impactTexts: ['찰싹!', '짝!', '퍽!', '쩍!', '와장창!', 'SMACK!', '철썩!', '빠악!'],
      audioType: 'slap'
    },
    punish: {
      bodyClass: 'mode-punish',
      handEmoji: '👊',
      title: '못했어! 땟찌 labelText! 😡',
      desc: '혼날 시간이야... 사정없이 때려주세요',
      labelCount: ' labelText',
      labelStat: '분노 LV',
      statDefault: '😠',
      markClass: 'anger',
      animation: 'hardShake',
      handAnimation: 'smack',
      impactClass: 'scold',
      particles: ['💢','💥','🔥','😡','💀','⚡','🗯️'],
      impactTexts: [' labelText!', '못했어!', '혼나야돼!', '이놈!', '나쁜놈!', '반성해!', '제대로 해!', '아휴...', '쯧 consequat!', '말 안듣지!', '맞아야 정신차려!', '에라이!'],
      audioType: 'smack'
    }
  };

  // 모드 전환
  function switchMode(mode) {
    currentMode = mode;
    const config = modeConfig[mode];
    
    // body 클래스 변경
    document.body.className = config.bodyClass;
    
    // 손 이모지 변경
    hand.textContent = config.handEmoji;
    
    // 타이틀 변경
    titleText.textContent = config.title;
    titleDesc.textContent = config.desc;
    
    // 라벨 변경
    labelCount.textContent = config.labelCount;
    labelStat.textContent = config.labelStat;
    
    // stat 초기화
    statEl.textContent = config.statDefault;
    
    // 효과 마크 클래스 변경
    markLeft.className = `effect-mark ${config.markClass} left`;
    markRight.className = `effect-mark ${config.markClass} right`;
    
    // 버튼 활성화 상태
    modeButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
    
    // 카운트 리셋
    count = 0;
    combo = 0;
    countEl.textContent = 0;
    clearTimeout(comboTimer);
  }

  // 모드 버튼 클릭
  modeButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      switchMode(btn.dataset.mode);
    });
  });

  // 마우스 이동
  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    hand.style.left = mouseX + 'px';
    hand.style.top = mouseY + 'px';
  });

  // 터치 이동 (모바일)
  document.addEventListener('touchmove', (e) => {
    e.preventDefault(); // 스크롤 방지
    const touch = e.touches[0];
    mouseX = touch.clientX;
    mouseY = touch.clientY;
    hand.style.left = mouseX + 'px';
    hand.style.top = mouseY + 'px';
  }, { passive: false });

  // 터치 시작 (모바일)
  document.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    mouseX = touch.clientX;
    mouseY = touch.clientY;
    hand.style.left = mouseX + 'px';
    hand.style.top = mouseY + 'px';
  }, { passive: false });

  // 더블 탭 줌 방지
  let lastTouchEnd = 0;
  document.addEventListener('touchstart', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 500) {
      e.preventDefault();
    }
  }, { passive: false });
  
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 500) {
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, false);

  // 오디오
  let audioCtx;
  async function initAudio() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }
    } catch(e) {
      console.log('Audio init failed:', e);
    }
  }
  
  function playSound(type) {
    try {
      if (!audioCtx) return;
      
      // suspended 상태면 resume 시도
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(() => {
          playSoundInternal(type);
        });
        return;
      }
      
      playSoundInternal(type);
    } catch(e) {
      console.log('Audio play failed:', e);
    }
  }
  
  function playSoundInternal(type) {
    try {
      const ctx = audioCtx;
      
      if (type === 'pat') {
        // 부드러운 팡팡 소리
        const dur = 0.25;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / ctx.sampleRate;
          data[i] = Math.sin(440 * Math.PI * 2 * t) * Math.exp(-t * 15) * 0.3;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.value = 0.4;
        src.connect(gain); gain.connect(ctx.destination);
        src.start();
      } else if (type === 'slap') {
        // 찰싹 소리
        const dur = 0.18;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / ctx.sampleRate;
          data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 35) * 0.7;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1800;
        filter.Q.value = 0.8;
        const gain = ctx.createGain();
        gain.gain.value = 0.5;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start();
      } else if (type === 'smack') {
        // 강한 짝! 소리
        const dur = 0.22;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / ctx.sampleRate;
          data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 25) * 0.8;
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 2400;
        filter.Q.value = 1.5;
        const gain = ctx.createGain();
        gain.gain.value = 0.7;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start();
        
        // 저음 thump
        const osc = ctx.createOscillator();
        const oGain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(120, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
        oGain.gain.setValueAtTime(0.6, ctx.currentTime);
        oGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        osc.connect(oGain); oGain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      }
    } catch(e) {
      console.log('Audio internal failed:', e);
    }
  }

  // 효과 생성
  function spawnEffects(x, y) {
    const config = modeConfig[currentMode];
    
    // 임팩트 텍스트
    const txt = document.createElement('div');
    txt.className = `impact-text ${config.impactClass}`;
    txt.textContent = config.impactTexts[Math.floor(Math.random() * config.impactTexts.length)];
    txt.style.left = x + 'px';
    txt.style.top = y + 'px';
    document.body.appendChild(txt);
    setTimeout(() => txt.remove(), 1000);
    
    // 파티클
    for (let i = 0; i < (currentMode === 'goodjob' ? 5 : 6); i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = config.particles[Math.floor(Math.random() * config.particles.length)];
      const angle = (Math.PI * 2 * i) / (currentMode === 'goodjob' ? 5 : 6) + Math.random() * 0.4;
      const dist = 60 + Math.random() * 40;
      const rot = Math.random() * 360;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--rot', rot + 'deg');
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1000);
    }
    
    // punish 모드 추가 효과
    if (currentMode === 'punish') {
      // 번개 플래시
      lightning.classList.remove('flash');
      void lightning.offsetWidth;
      lightning.classList.add('flash');
      
      // 크랙 텍스트
      if (Math.random() > 0.5) {
        const crack = document.createElement('div');
        crack.className = 'impact-text scold';
        crack.style.cssText = 'font-size:56px;color:#ffeb3b;text-shadow:2px 2px 0 #ff2d2d,0 0 12px #ff0000;animation:crackZoom 0.4s ease-out forwards;';
        crack.textContent = ['BAM!','POW!','쾅!','퍽!'][Math.floor(Math.random()*4)];
        crack.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
        crack.style.top = (y - 30 + (Math.random() - 0.5) * 40) + 'px';
        document.body.appendChild(crack);
        setTimeout(() => crack.remove(), 400);
      }
    }
  }

  // 클릭 핸들러
  function handleClick(e) {
    // 터치 이벤트와 마우스 이벤트 모두 처리
    const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
    const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
    
    const config = modeConfig[currentMode];
    
    // 손 애니메이션
    hand.classList.remove('pat', 'slap', 'smack');
    void hand.offsetWidth;
    hand.classList.add(config.handAnimation);
    
    // 이미지 변경 (butt_red.png로 변경, 200ms 후 복구)
    buttImage.src = 'assets/butt_red.png';
    setTimeout(() => {
      buttImage.src = 'assets/butt_normal.png';
    }, 200);
    
    // 플레이어 흔들림
    playerWrap.classList.remove('wiggle', 'shake', 'hardShake');
    void playerWrap.offsetWidth;
    playerWrap.classList.add(config.animation);
    
    // 빨간 자국 표시
    const rect = hitbox.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const target = clientX < centerX ? markLeft : markRight;
    target.classList.add('show');
    
    // 카운트 업데이트
    count++;
    countEl.textContent = count;
    
    // 모드별 stat 업데이트
    if (currentMode === 'goodjob') {
      if (count < 5) statEl.textContent = '💖';
      else if (count < 15) statEl.textContent = '💕';
      else if (count < 30) statEl.textContent = '💗';
      else if (count < 50) statEl.textContent = '💓';
      else statEl.textContent = '💘❤️';
    } else if (currentMode === 'spank') {
      combo++;
      statEl.textContent = 'x' + combo;
      if (combo >= 5) statEl.style.color = '#e74c3c';
      if (combo >= 10) {
        statEl.style.color = '#9b59b6';
        statEl.textContent = '🔥x' + combo + '🔥';
      }
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => {
        combo = 0;
        statEl.textContent = 'x0';
        statEl.style.color = '#e67e22';
      }, 1500);
    } else if (currentMode === 'punish') {
      if (count < 5) statEl.textContent = '😠';
      else if (count < 15) statEl.textContent = '😡';
      else if (count < 30) statEl.textContent = '🤬';
      else if (count < 50) statEl.textContent = '👹💢';
      else statEl.textContent = '☠️ MAX ☠️';
    }
    
    // 소리 및 효과
    playSound(config.audioType);
    spawnEffects(clientX, clientY);
  }

  // 엉덩이 영역 클릭/터치
  hitbox.addEventListener('click', handleClick);
  hitbox.addEventListener('touchend', (e) => {
    e.preventDefault();
    e.stopPropagation();
    handleClick(e.changedTouches[0]);
  });

  // 영역 밖 클릭/터치 (헛스윙)
  document.addEventListener('click', (e) => {
    if (e.target === hitbox || e.target === resetBtn || e.target.classList.contains('mode-btn')) return;
    
    const config = modeConfig[currentMode];
    hand.classList.remove('pat', 'slap', 'smack');
    void hand.offsetWidth;
    hand.classList.add(config.handAnimation);
    
    if (currentMode === 'spank') {
      combo = 0;
      statEl.textContent = 'x0';
      statEl.style.color = '#e67e22';
    }
  });

  // 모바일 터치 헛스윙
  document.addEventListener('touchend', (e) => {
    const target = e.changedTouches[0].target;
    if (target === hitbox || target === resetBtn || target.classList.contains('mode-btn')) return;
    
    e.preventDefault();
    
    const config = modeConfig[currentMode];
    hand.classList.remove('pat', 'slap', 'smack');
    void hand.offsetWidth;
    hand.classList.add(config.handAnimation);
    
    if (currentMode === 'spank') {
      combo = 0;
      statEl.textContent = 'x0';
      statEl.style.color = '#e67e22';
    }
  });

  // 리셋 버튼
  resetBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    count = 0;
    combo = 0;
    countEl.textContent = 0;
    statEl.textContent = modeConfig[currentMode].statDefault;
    statEl.style.color = '';
    markLeft.classList.remove('show');
    markRight.classList.remove('show');
  });

  // 첫 클릭/터치 시 오디오 활성화
  document.addEventListener('mousedown', () => {
    initAudio();
  }, { once: true });

  document.addEventListener('touchstart', () => {
    initAudio();
  }, { once: true, passive: false });

  // 배경浮动 이모지
  function spawnBgFloat() {
    const config = modeConfig[currentMode];
    const div = document.createElement('div');
    div.className = 'bg-float';
    
    if (currentMode === 'goodjob') {
      div.textContent = ['💖','💕','💗','✨','🌸'][Math.floor(Math.random() * 5)];
    } else if (currentMode === 'spank') {
      div.textContent = ['⭐','✨','💢','💥'][Math.floor(Math.random() * 4)];
    } else {
      div.textContent = ['💢','🔥','💥','😡'][Math.floor(Math.random() * 4)];
    }
    
    div.style.left = Math.random() * 100 + 'vw';
    div.style.bottom = '-30px';
    div.style.animationDuration = (6 + Math.random() * 5) + 's';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 12000);
  }
  setInterval(spawnBgFloat, 800);

  // punish 모드용 추가 키프레임
  const style = document.createElement('style');
  style.textContent = `
    @keyframes crackZoom {
      0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
      50% { transform: translate(-50%,-50%) scale(1.5) rotate(15deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(2) rotate(-10deg); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
