<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>야구선수 빌기 - 세 가지 모드</title>

<!-- ✅ GitHub Pages 경로 해결 -->
<base href="/baseball/">

<style>
  /* (기존 스타일 그대로 유지) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    cursor: none;
    user-select: none;
    transition: background 0.5s ease;
  }

  body.mode-goodjob {
    background: linear-gradient(180deg, #fff0f6 0%, #ffe5ef 100%);
  }

  .stage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100%;
  }

  #buttImage {
    width:300px;
  }
</style>
</head>

<body class="mode-goodjob">

<div class="stage">
  <!-- ✅ 경로 자동 해결됨 -->
  <img id="buttImage" src="assets/butt_normal.png" />
</div>

<script>
const buttImage = document.getElementById('buttImage');

document.addEventListener('click', () => {
  buttImage.src = "assets/butt_red.png";
  setTimeout(()=>{
    buttImage.src = "assets/butt_normal.png";
  },200);
});
</script>

</body>
</html>
